# Makga API Gateway — Nginx 고가용성 로드밸런서 설정
#
# 구성:
#   - HTTP → HTTPS 리다이렉트
#   - SSL/TLS 종료 (TLS 1.2/1.3)
#   - Gateway 인스턴스 3개에 least_conn 분산
#   - WebSocket 업그레이드 지원
#   - 연결 타임아웃 및 버퍼 최적화
#   - Gzip 압축
#   - 보안 헤더

user  nginx;
worker_processes  auto;          # CPU 코어 수에 맞게 자동 설정
worker_rlimit_nofile  65535;     # 파일 디스크립터 한도 (대량 연결 지원)
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  16384;   # 워커당 최대 연결 수 (총 = worker_processes × 16384)
    use  epoll;                  # Linux epoll I/O 모델 (고성능)
    multi_accept  on;            # 한 번에 여러 연결 수락
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── 로그 포맷 ────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main;

    # ─── 기본 성능 설정 ───────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  10000;   # 연결당 최대 요청 수 (Keep-Alive 효율화)
    server_tokens       off;     # Nginx 버전 노출 방지

    # ─── 버퍼 설정 ────────────────────────────────────────────────────────────
    client_body_buffer_size     128k;
    client_max_body_size        10m;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 8k;

    # ─── 타임아웃 설정 ────────────────────────────────────────────────────────
    client_body_timeout     30s;
    client_header_timeout   30s;
    send_timeout            30s;
    proxy_connect_timeout   5s;
    proxy_send_timeout      60s;
    proxy_read_timeout      60s;

    # ─── Gzip 압축 ────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   4;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml;

    # ─── 업스트림 (Gateway 인스턴스 3개) ─────────────────────────────────────
    upstream makga_gateway {
        # least_conn: 활성 연결 수가 가장 적은 서버로 분산 (게임 서버 특성상 적합)
        least_conn;

        server gateway-1:8080 weight=1 max_fails=3 fail_timeout=10s;
        server gateway-2:8080 weight=1 max_fails=3 fail_timeout=10s;
        server gateway-3:8080 weight=1 max_fails=3 fail_timeout=10s;

        # Keep-Alive 연결 풀 (업스트림 연결 재사용)
        keepalive        64;
        keepalive_time   10m;
        keepalive_timeout 75s;
        keepalive_requests 1000;
    }

    # ─── HTTP → HTTPS 리다이렉트 ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ACME 챌린지 허용 (Let's Encrypt)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS 서버 ───────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name api.makga.com;

        # ─── SSL/TLS 설정 ─────────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;

        ssl_session_cache   shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP Stapling (인증서 검증 속도 향상)
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver            8.8.8.8 8.8.4.4 valid=300s;

        # ─── 보안 헤더 ────────────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # ─── WebSocket 업그레이드 변수 ────────────────────────────────────────
        map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
        }

        # ─── 메인 프록시 ──────────────────────────────────────────────────────
        location / {
            proxy_pass         http://makga_gateway;
            proxy_http_version 1.1;

            # WebSocket 지원
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # 실제 클라이언트 정보 전달
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            # 버퍼링 설정
            proxy_buffering           on;
            proxy_buffer_size         8k;
            proxy_buffers             16 8k;
            proxy_busy_buffers_size   16k;

            # 업스트림 오류 시 다음 서버로 재시도
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 5s;
        }

        # ─── 헬스체크 엔드포인트 (로드밸런서 직접 접근) ─────────────────────
        location /health {
            proxy_pass http://makga_gateway/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        location /ready {
            proxy_pass http://makga_gateway/ready;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # ─── 정적 파일 캐싱 (선택적) ─────────────────────────────────────────
        location ~* \.(ico|css|js|gif|jpe?g|png|svg|woff2?)$ {
            proxy_pass http://makga_gateway;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}
