# Prometheus 설정 — Makga API Gateway 메트릭 수집
#
# 수집 대상:
#   - gateway-1, gateway-2, gateway-3 (Go 게이트웨이 /metrics 엔드포인트)
#   - redis-master (redis_exporter)
#   - nginx-lb (nginx_exporter)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: "makga-gateway"
    env: "production"

scrape_configs:
  # ─── Go Gateway 인스턴스 ──────────────────────────────────────────────────────
  - job_name: "makga-gateway"
    static_configs:
      - targets:
          - "gateway-1:9090"
          - "gateway-2:9090"
          - "gateway-3:9090"
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # ─── Redis Master ─────────────────────────────────────────────────────────────
  - job_name: "redis"
    static_configs:
      - targets:
          - "redis-master:6379"

  # ─── Nginx ────────────────────────────────────────────────────────────────────
  - job_name: "nginx"
    static_configs:
      - targets:
          - "nginx-lb:9113"

# ─── 알림 규칙 ────────────────────────────────────────────────────────────────
rule_files:
  - "/etc/prometheus/rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
